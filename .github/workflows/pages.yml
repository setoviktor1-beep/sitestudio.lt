name: Quality, build, and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tenant_domain:
        description: Published CMS tenant to export
        required: true
        default: sitestudio.lt
        type: string
      trigger_collection:
        description: Payload collection that requested the build
        required: false
        default: manual
        type: string

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Generate and validate Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Select allowlisted published tenant content
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TENANT_DOMAIN: ${{ inputs.tenant_domain }}
        run: |
          set -Eeuo pipefail
          content_file="$RUNNER_TEMP/sitestudio-content.json"
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$TENANT_DOMAIN" != "sitestudio.lt" ]]; then
              echo "Only the sitestudio.lt tenant may be published" >&2
              exit 1
            fi
            curl \
              --fail \
              --location \
              --max-filesize 1048576 \
              --max-time 30 \
              --proto '=https' \
              --retry 3 \
              --retry-all-errors \
              --show-error \
              --silent \
              --tlsv1.2 \
              "https://cms.sitestudio.lt/api/public/content?tenant=sitestudio.lt" \
              --output "$content_file"
          else
            cp content/sitestudio.lt.json "$content_file"
          fi
          python3 scripts/render-cms-content.py \
            --content "$content_file" \
            --site-root site
      - name: Install static-analysis dependencies
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install --yes ripgrep
      - name: Validate SiteStudio project contract
        run: ./scripts/sitestudio-validate-project.sh --project "$GITHUB_WORKSPACE" --profile static
      - name: Validate HTML, CSS, links, sitemap, SEO, and accessibility contract
        run: python3 scripts/validate-site.py
      - name: Compile Python generators and validators
        run: python3 -m py_compile scripts/render-cms-content.py scripts/validate-site.py
      - name: Run actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: v1.7.7
        run: |
          set -Eeuo pipefail
          export GOBIN="$RUNNER_TEMP/actionlint-bin"
          mkdir -p "$GOBIN"
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          "$GOBIN/actionlint" .github/workflows/*.yml
      - name: Build deterministic Pages artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p _site
          cp -a site/. _site/
          touch _site/.nojekyll
      - name: Upload approved Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy approved artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
