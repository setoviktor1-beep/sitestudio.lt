name: Quality, build, and deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tenant_domain:
        description: Published CMS tenant to export
        required: true
        default: sitestudio.lt
        type: string
      trigger_collection:
        description: Payload collection that requested the build
        required: false
        default: manual
        type: string

permissions:
  contents: read

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Generate and validate Pages artifact
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
      - name: Use current stable Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          cache: npm
          node-version: 24
      - name: Select allowlisted CMS-exported tenant snapshot
        shell: bash
        env:
          TENANT_DOMAIN: ${{ inputs.tenant_domain }}
        run: |
          set -Eeuo pipefail
          content_file="$RUNNER_TEMP/sitestudio-content.json"
          if [[ -n "$TENANT_DOMAIN" && "$TENANT_DOMAIN" != "sitestudio.lt" ]]; then
            echo "Only the sitestudio.lt tenant may be published" >&2
            exit 1
          fi
          cp content/sitestudio.lt.json "$content_file"
          python3 scripts/render-cms-content.py \
            --content "$content_file" \
            --site-root site
      - name: Install static-analysis dependencies
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install --yes ripgrep shellcheck
      - name: Install locked browser-quality dependencies
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"
        run: npm ci
      - name: Audit production dependency surface
        run: npm audit --omit=dev --audit-level=high
      - name: Validate SiteStudio project contract
        run: ./scripts/sitestudio-validate-project.sh --project "$GITHUB_WORKSPACE" --profile static
      - name: Validate HTML, CSS, links, sitemap, SEO, and accessibility contract
        run: python3 scripts/validate-site.py
      - name: Compile Python generators and validators
        run: python3 -m py_compile scripts/render-cms-content.py scripts/submit-indexnow.py scripts/validate-site.py
      - name: Run shellcheck
        run: |
          set -Eeuo pipefail
          mapfile -d '' shell_scripts < <(find scripts -type f -name '*.sh' -print0)
          shellcheck "${shell_scripts[@]}"
      - name: Run actionlint
        shell: bash
        env:
          ACTIONLINT_VERSION: v1.7.7
        run: |
          set -Eeuo pipefail
          export GOBIN="$RUNNER_TEMP/actionlint-bin"
          mkdir -p "$GOBIN"
          go install "github.com/rhysd/actionlint/cmd/actionlint@${ACTIONLINT_VERSION}"
          "$GOBIN/actionlint" .github/workflows/*.yml
      - name: Build deterministic Pages artifact
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p _site
          cp -a site/. _site/
          touch _site/.nojekyll
      - name: Run desktop and mobile smoke tests
        env:
          CHROME_PATH: /usr/bin/google-chrome
          SITE_ORIGIN: http://127.0.0.1:4173
        run: |
          set -Eeuo pipefail
          python3 -m http.server 4173 --bind 127.0.0.1 --directory _site >"$RUNNER_TEMP/site-server.log" 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for _ in {1..30}; do
            curl --fail --silent http://127.0.0.1:4173/ >/dev/null && break
            sleep 1
          done
          node scripts/smoke-browser.mjs
          npx --no-install pa11y-ci --config pa11yci.cjs
      - name: Run mobile Lighthouse CI
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: npx --no-install lhci autorun --config lighthouserc.json
      - name: Run desktop Lighthouse CI
        env:
          CHROME_PATH: /usr/bin/google-chrome
        run: npx --no-install lhci autorun --config lighthouserc-desktop.json
      - name: Upload approved Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: _site

  deploy:
    name: Deploy GitHub Pages
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy approved artifact
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

  indexnow:
    name: Notify IndexNow after production deploy
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
      - name: Render the deployed canonical URL set
        run: |
          set -Eeuo pipefail
          python3 scripts/render-cms-content.py \
            --content content/sitestudio.lt.json \
            --site-root site
      - name: Submit changed, added, and removed URLs
        env:
          AFTER_SHA: ${{ github.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -Eeuo pipefail
          python3 scripts/submit-indexnow.py \
            --before "$BEFORE_SHA" \
            --after "$AFTER_SHA"
